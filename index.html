<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Minimal Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
            position: relative;
            font-family: 'Segoe UI', sans-serif;
        }

        .nebula {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(200,230,255,0.08) 40%, transparent 70%);
            filter: blur(85px);
            z-index: 1;
            pointer-events: none;
            animation: drift 160s linear infinite, pulse 48s ease-in-out infinite;
        }
        
        @keyframes drift {
            from { transform: translate(0, 0) rotate(0deg); }
            to   { transform: translate(22vw, 12vh) rotate(6deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.45; }
            50%      { opacity: 0.92; }
        }

        .n1 { width: 65vw; height: 65vw; top: -15%; left: -10%; animation-duration: 160s, 52s; }
        .n2 { width: 48vw; height: 48vw; top: 30%; left: 60%; animation-duration: 145s, 61s; animation-direction: reverse; }
        .n3 { width: 72vw; height: 72vw; top: 55%; left: -20%; animation-duration: 210s, 47s; }
        .n4 { width: 55vw; height: 55vw; top: 10%; left: 70%; animation-duration: 165s, 55s; }
        .n5 { width: 80vw; height: 80vw; top: -25%; left: 35%; animation-duration: 195s, 68s; animation-direction: reverse; }
        .n6 { width: 40vw; height: 40vw; top: 70%; left: 5%; animation-duration: 130s, 43s; }

        .clock-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .clock {
            width: 58vmin;
            height: 58vmin;
            background: #ffffff;
            border: 12px solid #111111;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.2), inset 0 0 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            transform-origin: 50% 100%;
            background: #111111;
            border-radius: 10px;
        }
        /* ปรับสมดุลความหนาและยาวให้ดู Modern Minimal */
        .hour-hand   { width: 6px; height: 26%; z-index: 3; }
        .minute-hand { width: 4px; height: 40%; z-index: 4; }
        .second-hand { width: 2px; height: 44%; z-index: 5; }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background: #111111;
            border: 3px solid #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .markers { position: absolute; width: 100%; height: 100%; }
        .tick { position: absolute; width: 100%; height: 100%; }
        .tick::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 4px; /* ปรับ Marker ให้บางลงเข้ากับเข็ม */
            height: 18px;
            background: #111111;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="nebula n3"></div>
    <div class="nebula n4"></div>
    <div class="nebula n5"></div>
    <div class="nebula n6"></div>

    <div class="clock-container">
        <div class="clock">
            <div class="markers" id="markers"></div>
            <div class="hand hour-hand" id="hour"></div>
            <div class="hand minute-hand" id="minute"></div>
            <div class="hand second-hand" id="second"></div>
            <div class="center"></div>
        </div>
    </div>

    <script>
        const hHand = document.getElementById('hour');
        const mHand = document.getElementById('minute');
        const sHand = document.getElementById('second');
        const mDiv  = document.getElementById('markers');

        for (let i = 0; i < 12; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.transform = `rotate(${i * 30}deg)`;
            mDiv.appendChild(tick);
        }

        function update() {
            const now = new Date();
            const ms  = now.getMilliseconds();
            const s   = now.getSeconds() + ms / 1000;
            const m   = now.getMinutes() + s / 60;
            const h   = (now.getHours() % 12) + m / 60;

            sHand.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            mHand.style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
            hHand.style.transform = `translateX(-50%) rotate(${h * 30}deg)`;
            requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    </script>
</body>
</html>
