<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Black & White Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
            position: relative;
            font-family: 'Segoe UI', sans-serif;
        }

        /* === พื้นหลังมวลขาวเบลอ (ปรับใหม่ให้ขยับช้า + หายไป-มาแบบชิว ๆ) === */
        .nebula {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(200,230,255,0.08) 40%, transparent 70%);
            filter: blur(85px);
            z-index: 1;
            pointer-events: none;
            
            /* 2 แอนิเมชันรวมกัน */
            animation: 
                drift 160s linear infinite,
                pulse 48s ease-in-out infinite;
        }
        
        /* การเคลื่อนไหวช้าแบบเดิม (เลื่อน + หมุนเบา ๆ) */
        @keyframes drift {
            from { transform: translate(0, 0) rotate(0deg); }
            to   { transform: translate(22vw, 12vh) rotate(6deg); }
        }
        
        /* การหายไป-มาแบบชิว ๆ (วับ ๆ ช้า ๆ ทุก 40-70 วินาที) */
        @keyframes pulse {
            0%, 100% { opacity: 0.45; }
            50%      { opacity: 0.92; }
        }

        /* ปรับแต่ละก้อนให้ขยับและหายไม่พร้อมกัน (ดูธรรมชาติมาก) */
        .n1 { width: 65vw; height: 65vw; top: -15%; left: -10%; animation-duration: 160s, 52s; animation-delay: 0s, 3s; }
        .n2 { width: 48vw; height: 48vw; top: 30%; left: 60%; animation-duration: 145s, 61s; animation-delay: 0s, -18s; animation-direction: reverse; }
        .n3 { width: 72vw; height: 72vw; top: 55%; left: -20%; animation-duration: 210s, 47s; animation-delay: 0s, 12s; }
        .n4 { width: 55vw; height: 55vw; top: 10%; left: 70%; animation-duration: 165s, 55s; animation-delay: 0s, -9s; }
        .n5 { width: 80vw; height: 80vw; top: -25%; left: 35%; animation-duration: 195s, 68s; animation-delay: 0s, 25s; animation-direction: reverse; }
        .n6 { width: 40vw; height: 40vw; top: 70%; left: 5%; animation-duration: 130s, 43s; animation-delay: 0s, -31s; }

        /* === นาฬิกา (เหมือนเดิม 100% ตามที่คุณชอบ) === */
        .clock-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .clock {
            width: 58vmin;
            height: 58vmin;
            background: #ffffff;
            border: 14px solid #111111;
            border-radius: 50%;
            box-shadow: 
                0 0 50px rgba(0,0,0,0.25),
                inset 0 0 40px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            transform-origin: 50% 100%;
            border-radius: 9999px;
            background: #111111;
        }
        .hour-hand   { width: 12px; height: 31%; border-radius: 6px 6px 0 0; }
        .minute-hand { width: 7px;  height: 46%; border-radius: 6px 6px 0 0; }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            background: #111111;
            border: 5px solid #eeeeee;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .markers {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .tick {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .tick::before {
            content: '';
            position: absolute;
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 22px;
            background: #111111;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- มวลขาวเบลอ 6 ชิ้น (ขยับ + หายไป-มาช้า ๆ) -->
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="nebula n3"></div>
    <div class="nebula n4"></div>
    <div class="nebula n5"></div>
    <div class="nebula n6"></div>

    <div class="clock-container">
        <div id="clock" class="clock">
            <div class="markers" id="markers"></div>
            
            <div class="hand hour-hand" id="hour"></div>
            <div class="hand minute-hand" id="minute"></div>
            
            <div class="center"></div>
        </div>
    </div>

    <script>
        const hourHand   = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const markersDiv = document.getElementById('markers');

        function createTicks() {
            for (let i = 0; i < 12; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.transform = `rotate(${i * 30}deg)`;
                markersDiv.appendChild(tick);
            }
        }

        function updateClock() {
            const now = new Date();
            let minutes = now.getMinutes() + now.getSeconds() / 60;
            let hours   = (now.getHours() % 12) + minutes / 60;
            
            const minDeg  = minutes * 6;
            const hourDeg = hours * 30;
            
            hourHand.style.transform   = `translateX(-50%) rotate(${hourDeg}deg)`;
            minuteHand.style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
        }

        function start() {
            createTicks();
            setInterval(updateClock, 1000);
            updateClock();
        }

        window.onload = start;
    </script>
</body>
  </html>
